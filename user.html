<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Quicksand:wght@300..700&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>User-info</title>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block side-bar1 side-bar text-md-start text-center  ">
          <div>
            <h3><i class="fas fa-capsules"></i> Pill reminder</h3>
            <hr />
            <a href="index.html" class="active-hover">
              <i
                class="fas fa-home"
                style="font-size: 25px; margin-right: 10px"
              ></i
              >Dashboard</a
            >
            <a href="user.html" class="active-hover">
              <i
                class="fas fa-user"
                style="font-size: 25px; margin-right: 10px"
              ></i
              >Users</a
            >
            <a href="medic.html" class="active-hover"
              ><i
                class="fas fa-pills"
                style="font-size: 25px; margin-right: 10px"
              ></i
              >Assing medication</a
            >
            <a href="#" class="active-hover"
              ><i
                class="fas fa-clipboard-check"
                style="font-size: 25px; margin-right: 10px"
              ></i
              >View logs</a
            >
          </div>
        </nav>
        <div class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 main-page">
          <h1 class="mb-4 text-center text-md-start">
            Welcome, <span class="fw-bold">Admin!</span>
          </h1>
          <hr />

          <div
            class="section  d-flex gap-md-3 gap-5 w-100  flex-sm-column flex-lg-row flex-wrap text-lg-start text-center m-auto m-md-0 align-items-lg-start align-items-center justify-content-lg-start justify-content-center "
          >
            <div
              class="card rounded-5 Patient  shadow-sm"
              style="
                width: 18rem;
                height: 20rem;
                border-color: #3e6aa9;
                border-style: dotted;
                border-width: 2.5px;
              "
            >
              <img
                src="/src/assets/images/pngtree-flat-design-vector-illustration-of-people-icon-with-add-user-sign-icon-vector-png-image_42087924.jpg"
                style="width: 135px; margin: auto"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body cursor">
                <div class="card-title text-center">
                  <h4>Create New User</h4>
                </div>
                <div class="card-text fs-5 text-center lead m-auto">
                  Add a new patient
                </div>
                <button
                  class="btn w-100 mt-3 py-3 fs-5"
                  data-bs-toggle="modal"
                  data-bs-target="#create-user"
                  style="background-color: #3e6aa9; color: white"
                >
                  + Add User
                </button>
              </div>
            </div>
        
          
       
         
          
          </div>
          
          <!-- Modal -->
          <div
            class="modal fade"
            id="create-user"
            tabindex="-1"
            aria-labelledby="exampleModalLabel"
            aria-hidden="true"
          >
            <div class="modal-dialog modal-dialog-centered modal-sm">
              <div class="modal-content">
                <div class="modal-header">
                  <h1 class="modal-title fs-4" id="exampleModalLabel">
                    Create New User
                  </h1>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>
                <div class="modal-body">
                  <form>
                    <div class="mb-3">
                      <label for="UserIdInput" class="form-label"
                        >User ID</label
                      >
                      <input
                        type="text"
                        class="form-control outline"
                        id="User-id"
                        style="background-color: rgb(222, 222, 222)"
                        aria-describedby="emailHelp"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="UserNameInput" class="form-label">Name</label>
                      <input
                        type="text"
                        class="form-control outline"
                        style="background-color: rgb(222, 222, 222)"
                        id="User-name"
                      />
                    </div>
                    <div class="mb-3">
                      <label for="UserAge" class="form-label">Age</label>
                      <input
                        type="number"
                        class="form-control outline"
                        id="User-age"
                      />
                    </div>
                  </form>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    Close
                  </button>
                  <button
                    type="submit"
                    class="btn"
                    style="background-color: #3e6aa9; color: white"
                    id="User-Submit"
                  >
                    Create User
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
